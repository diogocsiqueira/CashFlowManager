spring:
  application:
    name: caixa

server:
  port: ${PORT:8080}

# =========================
# APP SETTINGS (GLOBAL)
# =========================
app:
  jwt:
    issuer: "caixa"
    accessMinutes: 30
    refreshDays: 14
    # DEV fallback ok (pra não travar sua vida local)
    secret: ${APP_JWT_SECRET:MUDE-ISSO-PRA-UM-SEGREDO-GIGANTE-EM-PROD}

  cookies:
    secure: ${APP_COOKIE_SECURE:false}
    sameSite: ${APP_COOKIE_SAMESITE:Lax}
    # deixa o cookie expirar junto do refresh token (em dias)
    refreshMaxAgeDays: ${APP_COOKIE_REFRESH_MAXAGE_DAYS:14}

# =========================
# DEV (local) -> H2
# =========================
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:caixa;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2

# =========================
# PROD (Render) -> Neon Postgres
# =========================
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# PROD overrides: sem fallback no secret (se faltar, app não sobe)
app:
  jwt:
    secret: ${APP_JWT_SECRET}
  cookies:
    secure: true
    sameSite: None
    refreshMaxAgeDays: 14
