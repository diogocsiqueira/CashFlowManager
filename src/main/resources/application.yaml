spring:
  application:
    name: caixa

server:
  # Render define PORT (default 10000). Você só precisa respeitar. :contentReference[oaicite:1]{index=1}
  port: ${PORT:8080}

# =========================
# DEV (local) -> H2
# =========================
---
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:caixa;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2

# =========================
# PROD (Render) -> Neon Postgres
# =========================
---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    # Você vai setar isso no Render como env var.
    # IMPORTANTE: Neon exige SSL -> sslmode=require :contentReference[oaicite:2]{index=2}
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
